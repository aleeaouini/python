<div>
  <h2>Liste des étudiants</h2>
  <mat-list>
    <mat-list-item *ngFor="let student of students">
      {{ student.name }} ({{ student.age }} ans) - {{ student.grade }}
      <button mat-button (click)="deleteStudent(student.id)">Supprimer</button>
    </mat-list-item>
  </mat-list>

  <div>
    <h3>Ajouter un étudiant</h3>
    <mat-form-field appearance="fill">
      <mat-label>Nom</mat-label>
      <input matInput [(ngModel)]="newStudent.name" placeholder="Nom" />
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Âge</mat-label>
      <input matInput [(ngModel)]="newStudent.age" placeholder="Âge" type="number" />
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Niveau</mat-label>
      <input matInput [(ngModel)]="newStudent.grade" placeholder="Niveau" />
    </mat-form-field>

    <button mat-raised-button (click)="addStudent()">Ajouter</button>
  </div>
</div>
